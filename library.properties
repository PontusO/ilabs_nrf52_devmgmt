name=iLabs nRF52 Device Management
version=0.4.0
author=Pontus Oldberg <pontus@ilabs.se>
maintainer=Pontus Oldberg <pontus@ilabs.se>
sentence=Device management for nRF52 devices: LTE/HTTPS firmware-over-the-air updates and log upload over external QSPI flash.
paragraph=FOTA downloads a gzip-compressed firmware slot image over a caller-supplied HTTPS transport, stream-stages it into a W25Q64-class QSPI download partition, verifies SHA-256 against the slot header, and arms the Adafruit-fork bootloader settings block. An update-check polls a small static JSON manifest and decides whether a newer image is offered for the device. A transport-agnostic log uploader compresses and POSTs accumulated log bytes in resumable chunks. Modem-agnostic: the byte transport and all system couplings (logging, sleep, radio coexistence) are injected as hooks.
category=Communication
url=https://github.com/PontusO/ilabs_nrf52_devmgmt
architectures=nrf52
includes=iLabs_nrf52_devmgmt.h
