name=iLabs nRF52 FOTA
version=0.1.0
author=Pontus Oldberg <pontus@ilabs.se>
maintainer=Pontus Oldberg <pontus@ilabs.se>
sentence=LTE/HTTPS firmware-over-the-air updates for nRF52 devices with external QSPI flash.
paragraph=Downloads a gzip-compressed firmware slot image over a caller-supplied HTTPS transport, stream-stages it into a W25Q64-class QSPI download partition, verifies SHA-256 against the slot header, and arms the Adafruit-fork bootloader settings block. Modem-agnostic: the byte transport and all system couplings (logging, sleep, radio coexistence) are injected as hooks.
category=Communication
url=https://github.com/PontusO/ilabs_nrf52_fota
architectures=nrf52
includes=iLabs_nrf52_fota.h
